<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AbscomSVG — Smiley Face</title>
</head>
<body>
  <h2>Animated Smiley Face</h2>
  <svg id="demo" width="400" height="400" xmlns="http://www.w3.org/2000/svg"></svg>

  <script src="/dist/abscomsvg.iife.js"></script>
  <script>
    const face = AbscomSVG.circle(200, 200, 140, 'gold');

    const leftEye = {
      ...AbscomSVG.circle(140, 160, 18, '#333'),
      children: [
        AbscomSVG.animate('cy', '160', '150', '0.5s', 'indefinite'),
      ],
    };

    const mouth = AbscomSVG.path('M120 250 Q200 320 280 250', 'none');
    AbscomSVG.withStroke(mouth, '#333', 4);

    AbscomSVG.render('demo', [
      face,
      leftEye,
      AbscomSVG.circle(260, 160, 18, '#333'),
      mouth,
    ]);
  </script>
</body>
</html>
